# Default values for pdfbox.
# This is a minimal, production-sane starting point — override what you need.

replicaCount: 1

image:
  repository: softwarity/pdfbox
  # Image tag. Empty string falls back to the chart's appVersion. Pin a release (e.g. "1.0.0") in prod.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Extra environment variables for the container (the PDFBOX_* knobs documented in Configuration).
# e.g.
#   env:
#     PDFBOX_DEFAULT_STANDARD: PDF_A_2U
#     PDFBOX_DEFAULT_LANG: en
#     PDFBOX_BASE_PATH: /pdfbox
env: {}

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: pdfbox.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: pdfbox-tls
  #    hosts:
  #      - pdfbox.example.com

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

# Probes hit /actuator/health (prefixed with PDFBOX_BASE_PATH if set). The startupProbe gives the
# JVM + font index time to warm up before liveness kicks in.
probes:
  startup:
    enabled: true
    failureThreshold: 30
    periodSeconds: 5
  readiness:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
  liveness:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 15

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Mount extra TrueType (.ttf) fonts at /app/fonts (e.g. CJK for the bare jar, or an exotic script).
# Provide them via an existing ConfigMap (binaryData) or a PersistentVolumeClaim. TrueType only;
# freeze variable fonts to a static instance first (see the Fonts & scripts docs).
extraFonts:
  enabled: false
  # mountPath inside the container; matches the default PDFBOX_FONTS_DIRECTORIES.
  mountPath: /app/fonts
  # Exactly one source. configMap takes precedence over persistentVolumeClaim.
  configMap: ""
  persistentVolumeClaim: ""

nodeSelector: {}
tolerations: []
affinity: {}

# Extra volumes / mounts if you need more than extraFonts.
extraVolumes: []
extraVolumeMounts: []
