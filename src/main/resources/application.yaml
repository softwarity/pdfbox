spring:
  application:
    name: pdfbox
  mvc:
    async:
      request-timeout: 120000
  codec:
    max-in-memory-size: 50MB

server:
  port: 8080
  tomcat:
    max-http-form-post-size: 50MB
    max-swallow-size: 50MB

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

pdfbox:
  # Default output standard when the request does not specify one.
  default-standard: PDF_A_1B
  # Default font stack applied when the HTML sets none. openhtmltopdf falls back per glyph through
  # this list, so a single document can mix Latin, Vietnamese, Hebrew, Japanese... out of the box.
  default-font-family: "'Noto Sans','Noto Sans Hebrew','Noto Sans Arabic','Noto Sans Thai','Noto Sans Devanagari','Noto Sans JP','Noto Sans CJK JP',sans-serif"
  # Comma-separated directories scanned recursively at startup for embeddable .ttf / .otf fonts.
  fonts:
    directories: /app/fonts,/usr/share/fonts,fonts
