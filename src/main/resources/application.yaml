spring:
  application:
    name: pdfbox
  # Optionally pull local-only overrides (e.g. PDFBOX_BASE_PATH) from an untracked
  # local.properties at the working directory. 'optional:' = no error when absent (prod).
  config:
    import: "optional:file:local.properties"
  mvc:
    async:
      request-timeout: 120000
  codec:
    max-in-memory-size: 50MB

server:
  port: 8080
  servlet:
    # Optional base path prefixed to every route. Must start with '/'. Empty by default (served at
    # the root). E.g. PDFBOX_BASE_PATH=/pdfbox exposes POST /pdfbox/api/v1/pdf, /pdfbox/swagger-ui...
    context-path: ${PDFBOX_BASE_PATH:}
  tomcat:
    max-http-form-post-size: 50MB
    max-swallow-size: 50MB

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  # OpenAPI description stays available everywhere (handy for client generation).
  api-docs:
    path: /v3/api-docs
  # Swagger UI is a dev-only convenience: disabled here, re-enabled by the `dev` profile below.
  swagger-ui:
    enabled: false
    path: /swagger-ui.html

pdfbox:
  # Default output standard when the request does not specify one.
  default-standard: PDF_A_1B
  # Fallback document language injected as <html lang> when the source omits it. PDF/UA (the "A"
  # levels) requires a language; set this to the language you actually generate most often.
  default-lang: en
  # Fallback <title> injected when the source has none (and no usable <h1>/<h2>/<h3>). PDF/UA needs
  # a document title; an accurate source <title> always wins over this generic default.
  default-title: Document
  # Default font stack applied when the HTML sets none. openhtmltopdf falls back per glyph through
  # this list, so a single document can mix Latin, Vietnamese, Hebrew, Japanese... out of the box.
  # The list names every supported script; FontService only registers the few a given document
  # actually contains (by Unicode block), so naming all of them here costs nothing per render — an
  # unused family is simply never loaded. CJK families (JP/KR/SC/TC) are picked per document from lang.
  default-font-family: "'Noto Sans','Noto Sans Hebrew','Noto Sans Arabic','Noto Sans Thaana','Noto Sans Devanagari','Noto Sans Bengali','Noto Sans Gurmukhi','Noto Sans Gujarati','Noto Sans Oriya','Noto Sans Tamil','Noto Sans Telugu','Noto Sans Kannada','Noto Sans Malayalam','Noto Sans Sinhala','Noto Sans Thai','Noto Sans Lao','Noto Sans Myanmar','Noto Sans Georgian','Noto Sans Armenian','Noto Sans Ethiopic','Noto Sans Khmer','Noto Sans JP','Noto Sans KR','Noto Sans SC','Noto Sans TC','Noto Sans Symbols','Noto Sans Symbols2','Noto Sans Math','Noto Emoji',sans-serif"
  # Comma-separated directories scanned recursively at startup for embeddable .ttf / .otf fonts.
  fonts:
    directories: /app/fonts,/usr/share/fonts,fonts

logging:
  level:
    # The bundled Noto CJK faces carry a cmap format 14 (Unicode variation sequences) table that
    # PDFBox cannot read; it logs a WARN per face on every render. Harmless (normal glyphs embed
    # fine, no PDF/A impact) and unfixable without re-mastering the .ttf, so silence just this one.
    org.apache.fontbox.ttf.CmapSubtable: error

---
# Development profile: enables the interactive Swagger UI at /swagger-ui.html.
# Activate with `--spring.profiles.active=dev` or `SPRING_PROFILES_ACTIVE=dev`.
spring:
  config:
    activate:
      on-profile: dev

springdoc:
  swagger-ui:
    enabled: true
