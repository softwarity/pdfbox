name: Docker release

# Triggered by version tags created by the Release workflow: verify, then build
# and publish the released image (semver tags + latest) via the shared multi-arch
# workflow.
on:
  push:
    tags: ["v*"]

jobs:
  verify:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build and test
        run: mvn -B -ntp verify

  image:
    name: Build & publish image
    needs: verify
    uses: ./.github/workflows/_docker.yml
    secrets: inherit
