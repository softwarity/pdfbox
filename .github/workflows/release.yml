name: Release

# Cut a semantic-version release from main. This creates and pushes a vX.Y.Z tag,
# which in turn triggers the "Docker release" workflow to publish the release image.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version part to bump
        type: choice
        required: true
        default: patch
        options: [patch, minor, major]

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          latest=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          [ -z "$latest" ] && latest="v0.0.0"
          ver=${latest#v}
          IFS=. read -r MA MI PA <<< "$ver"
          case "${{ github.event.inputs.bump }}" in
            major) MA=$((MA+1)); MI=0; PA=0 ;;
            minor) MI=$((MI+1)); PA=0 ;;
            patch) PA=$((PA+1)) ;;
          esac
          new="v${MA}.${MI}.${PA}"
          echo "Previous: $latest  ->  New: $new"
          echo "tag=$new" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ steps.version.outputs.tag }}" --generate-notes --title "${{ steps.version.outputs.tag }}"
